services:
  api:
    build:
      context: .
      dockerfile: standalone/Dockerfile
    env_file: [.env]
    ports:
      - "${API_PORT:-8000}:8000"
    # Uncomment to enable optional database
    # depends_on:
    #   db:
    #     condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: ui/standalone/Dockerfile
    ports:
      - "${UI_PORT:-3000}:80"
    depends_on: [api]

